name: QA Test Suite

on:
  push:
    branches: ["main", "feature/*"]
  pull_request:
    branches: ["main"]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: create .env file from GitHub Secrets
        run: |
          echo "GITHUB_TOKEN=${{ secrets.GH_API_TOKEN }}" >> .env

      - name: Run Pytest in Docker
        run: docker compose up --build --exit-code-from qa-suite
